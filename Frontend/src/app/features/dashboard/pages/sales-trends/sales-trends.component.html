<!-- sales-trends.component.html -->
<div class="dashboard-page">
  <app-filter-bar (filterChange)="filterService.updateFilters($event)"></app-filter-bar>

  <h2>Sales Trends</h2>

  <div class="chart-row">
    <div class="chart-container">
      <h3>Daily Sales</h3>
      <canvas baseChart [data]="dailyData" chartType="line"></canvas>
    </div>
    <div class="chart-container">
      <h3>Monthly Sales & Orders</h3>
      <!-- For combo chart, we need orders data; we'll simplify with a second dataset -->
      <canvas baseChart [data]="monthlyData" chartType="bar"></canvas>
    </div>
  </div>

  <div class="chart-row">
    <div class="chart-container">
      <h3>Cumulative Sales</h3>
      <canvas baseChart [data]="cumulativeData" chartType="line"></canvas>
    </div>
    <div class="chart-container">
      <h3>Year-over-Year Comparison</h3>
      <table>
        <tr><th>Year</th><th>Month</th><th>Sales</th></tr>
        <tr *ngFor="let item of yoyData">
          <td>{{ item.year }}</td><td>{{ item.month }}</td><td>{{ item.sales | currency }}</td>
        </tr>
      </table>
    </div>
  </div>
</div>
