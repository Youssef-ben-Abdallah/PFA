<div class="dashboard-page">
  <app-filter-bar (filterChange)="filterService.updateFilters($event)"></app-filter-bar>

  <h2>Customer Analysis</h2>

  <div class="chart-row">
    <div class="chart-container">
      <h3>Top 20 Customers</h3>
      <canvas baseChart
        [data]="topCustomersChartData"
        chartType="bar">
      </canvas>
    </div>
    <div class="chart-container">
      <h3>Order Value Distribution</h3>
      <canvas baseChart
        [data]="orderDistributionChartData"
        chartType="bar">
      </canvas>
    </div>
  </div>

  <div class="chart-row">
    <div class="chart-container">
      <h3>New Customers per Month</h3>
      <canvas baseChart
        [data]="newCustomersChartData"
        chartType="line">
      </canvas>
    </div>
    <div class="chart-container">
      <h3>Customer by Territory</h3>
      <table>
        <tr><th>Territory</th><th>Customer</th><th>Sales</th><th>Orders</th></tr>
        <tr *ngFor="let item of territoryMatrix">
          <td>{{ item.territory }}</td><td>{{ item.customer }}</td>
          <td>{{ item.sales | currency }}</td><td>{{ item.orders }}</td>
        </tr>
      </table>
    </div>
  </div>
</div>
