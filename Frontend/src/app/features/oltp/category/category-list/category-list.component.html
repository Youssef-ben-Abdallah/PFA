<div class="container">
  <h2>Categories</h2>
  <button (click)="add()">Add Category</button>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of categories">
        <td>{{ c.id }}</td>
        <td>{{ c.name }}</td>
        <td>{{ c.description }}</td>
        <td>
          <button (click)="edit(c.id!)">Edit</button>
          <button (click)="delete(c.id!)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
